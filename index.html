<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training Log">
<meta name="theme-color" content="#08111d">
<title>Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #08111d;
    --bg-2:      #0c1726;
    --surface:   #111e30;
    --surface-2: #18283e;
    --border:    #213650;
    --border-2:  #2d425c;
    --base:      #2d425c;

    --text:      #f9fcff;
    --text-2:    #c8d4e3;
    --muted:     #6c8099;
    --muted-2:   #455a76;

    --accent:    #0691ff;
    --accent-2:  #38a8ff;
    --accent-dim:#0a4a82;
    --glow:      rgba(6, 145, 255, 0.35);

    --success:   #00e5a1;
    --danger:    #ff4d6d;
    --work:      #00e5a1;
    --rest:      #ff4d6d;

    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    /* subtle vignette + scanline glow */
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(6,145,255,0.10), transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(45,66,92,0.35), transparent 70%),
      var(--bg);
    padding-bottom: calc(var(--safe-bottom) + 80px);
  }

  button, input, select, textarea {
    font-family: inherit;
    color: inherit;
  }

  /* ─── App Shell ──────────────────────────── */
  .app {
    max-width: 520px;
    margin: 0 auto;
    padding-top: var(--safe-top);
  }

  header {
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dim));
    position: relative;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06) inset, 0 4px 16px var(--glow);
  }
  .brand-mark::after {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 3px;
    border: 1.5px solid rgba(255,255,255,0.95);
    border-right: none;
    border-top: none;
    transform: rotate(-45deg);
  }
  .brand-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    letter-spacing: -0.01em;
  }
  .brand-name span { color: var(--accent); font-weight: 600; }

  .date-badge {
    text-align: right;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    line-height: 1.6;
  }
  .date-badge strong {
    display: block;
    color: var(--text-2);
    font-weight: 500;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
  }

  /* Progress + meta strip */
  .meta-strip {
    padding: 0 20px 12px;
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .meta-row .count {
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text);
    letter-spacing: 0.05em;
  }
  .meta-row .count b { color: var(--accent); font-weight: 700; }

  .progress-bar {
    height: 4px;
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 12px var(--glow);
    width: 0%;
    transition: width 0.5s cubic-bezier(.2,.8,.2,1);
    border-radius: 4px;
  }

  /* Tabs */
  .tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 0 20px;
    margin-bottom: 16px;
  }
  .tab {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
  }
  .tab.active {
    color: var(--text);
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent) inset, 0 4px 16px rgba(6,145,255,0.18);
  }
  .tab .dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted-2);
    margin-right: 6px;
    vertical-align: middle;
    transform: translateY(-1px);
  }
  .tab.active .dot { background: var(--accent); box-shadow: 0 0 8px var(--glow); }

  /* Views */
  .view { display: none; padding: 0 20px; animation: fade 0.25s ease; }
  .view.active { display: block; }
  @keyframes fade {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Section labels ─────────────────────── */
  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--muted);
    margin: 22px 2px 10px;
    font-weight: 600;
  }
  .section-label::before {
    content: '';
    width: 14px; height: 1px;
    background: var(--accent);
  }
  .section-label::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
  }

  /* ─── Exercise Card ──────────────────────── */
  .ex-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .ex-card.open {
    border-color: var(--border-2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  }
  .ex-card.done {
    border-color: rgba(0,229,161,0.45);
    background: linear-gradient(180deg, var(--surface), rgba(0,229,161,0.04));
  }

  .ex-header {
    display: flex;
    align-items: center;
    padding: 14px 14px 14px 16px;
    gap: 12px;
    cursor: pointer;
    min-height: 64px;
  }

  .ex-status {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--border-2);
    background: var(--bg-2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 0.75rem;
    color: var(--muted);
    transition: all 0.2s;
  }
  .ex-card.done .ex-status {
    background: var(--success);
    border-color: var(--success);
    color: var(--bg);
    box-shadow: 0 0 0 4px rgba(0,229,161,0.12);
  }
  .ex-card.done .ex-status::before { content: '✓'; font-weight: 700; }
  .ex-card:not(.done) .ex-status::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--muted-2);
    border-radius: 50%;
  }

  .ex-name-wrap { flex: 1; min-width: 0; }
  .ex-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 1.05rem;
    letter-spacing: -0.01em;
    color: var(--text);
    background: none;
    border: none;
    width: 100%;
    padding: 2px 0;
    border-radius: 4px;
  }
  .ex-name:focus {
    outline: none;
    color: var(--accent);
    background: rgba(6,145,255,0.08);
    padding: 2px 6px;
    margin: 0 -6px;
  }
  .ex-meta {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
  }
  .ex-meta b { color: var(--accent); font-weight: 500; }

  .ex-chevron {
    color: var(--muted);
    font-size: 0.7rem;
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .ex-card.open .ex-chevron { transform: rotate(180deg); color: var(--accent); }

  .ex-body {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
  .ex-card.open .ex-body { display: block; animation: bodySlide 0.25s ease; }
  @keyframes bodySlide {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Last + suggestion */
  .last-strip {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .pill {
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 5px 10px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .pill b { color: var(--text); font-weight: 600; }

  .suggestion {
    background: linear-gradient(135deg, rgba(6,145,255,0.12), rgba(6,145,255,0.02));
    border: 1px solid rgba(6,145,255,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .suggestion-label {
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    margin-bottom: 2px;
    font-weight: 600;
  }
  .suggestion-val {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .suggestion-hint {
    font-size: 0.58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-align: right;
    line-height: 1.4;
  }
  .suggestion-hint b { color: var(--accent); font-weight: 500; }

  /* EMOM picker */
  .picker-label {
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .interval-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 16px;
  }
  .interval-btn {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    font-weight: 500;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
    min-height: 36px;
  }
  .interval-btn:active { transform: scale(0.96); }
  .interval-btn.selected {
    background: rgba(6,145,255,0.15);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent) inset;
  }

  /* Set list */
  .sets-wrap { margin-bottom: 12px; }
  .set-row {
    display: grid;
    grid-template-columns: 38px 1fr 1fr 44px;
    gap: 8px;
    align-items: stretch;
    margin-bottom: 6px;
  }
  .set-row.bw { grid-template-columns: 38px 1fr 44px; }
  .set-num {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .set-row.complete .set-num {
    background: rgba(0,229,161,0.1);
    border-color: rgba(0,229,161,0.4);
    color: var(--success);
  }
  .set-input {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 10px;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    width: 100%;
    min-height: 44px;
    -webkit-appearance: none;
    transition: border-color 0.15s;
  }
  .set-input::placeholder { color: var(--muted-2); font-weight: 400; }
  .set-input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface-2);
  }
  .set-input-wrap { position: relative; }
  .set-input-wrap .unit {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    font-size: 0.55rem;
    color: var(--muted-2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    pointer-events: none;
  }
  .set-check {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    color: var(--muted);
    transition: all 0.15s;
  }
  .set-check:active { transform: scale(0.94); }
  .set-row.complete .set-check {
    background: var(--success);
    border-color: var(--success);
    color: var(--bg);
  }
  .set-row.complete .set-input {
    border-color: rgba(0,229,161,0.3);
    color: var(--text-2);
  }

  .add-set {
    width: 100%;
    background: none;
    border: 1px dashed var(--border-2);
    border-radius: 8px;
    padding: 9px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    margin-top: 4px;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .add-set:active { border-color: var(--accent); color: var(--accent); }

  /* Notiz */
  .note-input {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 12px;
    font-size: 0.78rem;
    color: var(--text);
    margin-bottom: 12px;
    min-height: 42px;
    -webkit-appearance: none;
  }
  .note-input:focus { outline: none; border-color: var(--accent); }
  .note-input::placeholder { color: var(--muted-2); }

  /* Geschafft Button */
  .btn-done {
    width: 100%;
    background: linear-gradient(180deg, var(--accent), #0578d4);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    min-height: 52px;
    box-shadow: 0 4px 16px rgba(6,145,255,0.35), 0 0 0 1px rgba(255,255,255,0.08) inset;
    transition: transform 0.1s;
  }
  .btn-done:active { transform: scale(0.985); }
  .btn-done.success {
    background: linear-gradient(180deg, var(--success), #00b884);
    box-shadow: 0 4px 16px rgba(0,229,161,0.3), 0 0 0 1px rgba(255,255,255,0.08) inset;
    color: var(--bg);
  }

  /* TRX */
  .trx-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 12px;
  }
  .trx-cell {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 6px;
    text-align: center;
  }
  .trx-cell label {
    display: block;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .trx-cell input {
    background: none;
    border: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    width: 100%;
    text-align: center;
    padding: 2px;
  }
  .trx-cell input:focus { outline: none; color: var(--accent); }

  .band-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 12px;
  }
  .band-row > div { display: flex; flex-direction: column; gap: 4px; }
  .band-row label {
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-weight: 600;
  }
  .band-row input {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-size: 0.8rem;
    -webkit-appearance: none;
  }
  .band-row input:focus { outline: none; border-color: var(--accent); }

  /* Save bar (fixed) */
  .save-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(180deg, transparent, var(--bg) 30%);
    padding: 20px 20px calc(var(--safe-bottom) + 16px);
    z-index: 50;
    pointer-events: none;
  }
  .save-bar .inner {
    max-width: 520px;
    margin: 0 auto;
    pointer-events: auto;
  }
  .btn-save-session {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 12px;
    padding: 15px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-2);
    cursor: pointer;
    min-height: 56px;
    backdrop-filter: blur(8px);
    box-shadow: 0 -4px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04) inset;
    transition: all 0.2s;
  }
  .btn-save-session.ready {
    background: linear-gradient(180deg, var(--accent), #0578d4);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 -4px 32px rgba(6,145,255,0.3), 0 0 0 1px rgba(255,255,255,0.08) inset;
  }
  .btn-save-session.saved {
    background: var(--success);
    border-color: var(--success);
    color: var(--bg);
  }

  /* ─── TIMER ──────────────────────────────── */
  .timer-modes {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 18px;
  }
  .timer-mode {
    background: none;
    border: none;
    padding: 11px 4px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
  }
  .timer-mode.active {
    background: linear-gradient(180deg, var(--accent), #0578d4);
    color: white;
    box-shadow: 0 4px 14px rgba(6,145,255,0.35);
  }

  .timer-config {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 18px;
  }
  .config-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .config-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .config-row.single { grid-template-columns: 1fr; }
  .config-cell {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .config-cell label {
    display: block;
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .config-cell .val {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .config-cell input {
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    width: 100%;
    padding: 0;
    letter-spacing: -0.02em;
    -webkit-appearance: none;
  }
  .config-cell input:focus { outline: none; color: var(--accent); }
  .config-cell .unit {
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Timer display — circular ring is the hero */
  .timer-display {
    background:
      radial-gradient(ellipse 60% 50% at 50% 50%, rgba(6,145,255,0.06), transparent 70%),
      var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 20px 20px 22px;
